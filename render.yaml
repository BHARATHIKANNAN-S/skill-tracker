services:
  - type: web
    name: skill-tracker
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false # Render will prompt you to enter your MongoDB connection string securely
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random key for JWT
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_APP_NAME
        value: SkillForge
      - key: NEXT_PUBLIC_APP_URL
        value: https://skill-tracker.onrender.com # Change to your actual Render URL after deployment
      - key: GROQ_API_KEY
        sync: false # Render will prompt you to enter your Groq API key securely
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
