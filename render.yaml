services:
  - type: web
    name: skill-tracker
    plan: free # Ensures it deploys on Render's Free tier without requiring billing info
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_APP_NAME
        value: SkillForge
      - key: NEXT_PUBLIC_APP_URL
        value: https://skill-tracker.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
